[alembic]
# script_location and sqlalchemy.url are set programmatically by
# forza/db/migrate.py — do not hardcode the URL here.
script_location = forza/db/migrations

# Optional: used only when running `alembic` CLI directly (not via forza).
# Override with:  alembic -x db=sqlite:///data/forza.sqlite3 upgrade head
# sqlalchemy.url = sqlite:///data/forza.sqlite3

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
